<html lang="en">
    <head>
        <title>BOIDS Simulation</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:ital,wght@0,100;1,100&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <link rel="preconnect" href="https://fonts.googleapis.com">

        <link rel="stylesheet" href="stylesheets/boids.css">

    <body>
        <h2>BOIDS</h2>
        <canvas id="boids" height="400px" width="800px" style="border: 4px solid white;  background-color: black;"></canvas>
        <div class="buttonsContainer">
            <button class="button" id="reset">Reset Simulation</button>
            <button class="button" id="devMode">Info</button>
        </div>
        <h4>Boids is an artificial life simulation that closely resembles the flocking behavior of birds or fish.</h4>
        <h4>The simulation follows three simple algorithms: Seperation, Alignment, and Cohesion.</h4>

        <script type="module" src="scripts/boids.js"></script>
    </body>
